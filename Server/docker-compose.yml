version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: safeledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: safeledger
      POSTGRES_PASSWORD: safeledger
      POSTGRES_DB: safeledger
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safeledger-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: