version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: safeledger-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safeledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-safeledger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - safeledger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safeledger} -d ${POSTGRES_DB:-safeledger}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: safeledger-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - safeledger-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: safeledger-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-safeledger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-safeledger}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HEDERA_NETWORK: ${HEDERA_NETWORK:-testnet}
      HEDERA_ACCOUNT_ID: ${HEDERA_ACCOUNT_ID}
      HEDERA_PRIVATE_KEY: ${HEDERA_PRIVATE_KEY}
      HEDERA_TOPIC_ID: ${HEDERA_TOPIC_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - safeledger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: safeledger-frontend-prod
    restart: unless-stopped
    environment:
      REACT_APP_API_BASE_URL: ${FRONTEND_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    networks:
      - safeledger-network

  nginx:
    image: nginx:alpine
    container_name: safeledger-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - safeledger-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  safeledger-network:
    driver: bridge
